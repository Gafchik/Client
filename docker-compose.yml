# Только БД поднимается в Docker. API и фронт запускаются локально
# (npm run start) — это даёт hot-reload и прямой доступ к локальному диску
# для агентов, без пересборки образов и маппинга путей контейнера.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_team}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: ${TZ:-Europe/Kiev}
    ports:
      - "${POSTGRES_PORT:-35433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_agent_team}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
