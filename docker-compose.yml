services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_team}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: ${TZ:-Europe/Kiev}
    ports:
      - "${POSTGRES_PORT:-35433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_agent_team}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-ai_agent_team}
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      LOCAL_PROJECTS_ROOT: ${LOCAL_PROJECTS_ROOT:-/Users/evgenii}
      CONTAINER_PROJECTS_ROOT: ${CONTAINER_PROJECTS_ROOT:-/host-projects}
      STORAGE_ROOT: /app/storage
      TZ: ${TZ:-Europe/Kiev}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./storage:/app/storage
      - ${LOCAL_PROJECTS_ROOT:-/Users/evgenii}:${CONTAINER_PROJECTS_ROOT:-/host-projects}

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  postgres_data:
